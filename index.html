<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    
    <div class="calculator">
        <input type="text" placeholder="0" id="inputbox">
        <div class="buttons">
            <button class="A">Ac</button>
            <button class="D">DEL</button>
            <button class="B">%</button>
            <button class="tutu">/</button>
            <br>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="kalu">*</button>
            <br>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="sajid">-</button>
            <br>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="Hani">+</button>
            <br>
            <button>00</button>
            <button>0</button>
            <button>.</button>
            <button class="Hanzala">=</button>
        </div>
    </div>
    <script src="Script.js"></script>
</body>
</html>
